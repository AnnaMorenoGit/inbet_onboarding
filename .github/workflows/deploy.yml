name: Build & deploy presentation

# Rebuilds the slide images from the .pptx on every push, then publishes to
# GitHub Pages. Push a new Welcome_Inbet_Online.pptx and the site re-syncs itself.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LibreOffice + Poppler + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils fonts-crosextra-carlito

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python deps
        run: pip install Pillow python-pptx

      - name: Regenerate slides + manifest from the .pptx
        run: python build.py

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
