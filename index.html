<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Welcome to Inbet — Presentation</title>
<style>
/* ============================== Theme ============================== */
:root{
  --brand:        #0033b5;   /* Inbet royal blue (sampled) */
  --brand-dark:   #00269a;
  --brand-deep:   #001c78;   /* sidebar background */
  --brand-deeper: #001152;
  --accent:       #f8e048;   /* Inbet yellow (sampled from logo) */
  --ink:          #0e1633;
  --muted:        #aeb9e8;
  --paper:        #eef1fb;
  --sidebar-w:    300px;
  --radius:       14px;
  --shadow:       0 14px 40px rgba(8,16,60,.22);
}
*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; }
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  color:var(--ink); background:var(--paper); overflow:hidden;
}

/* ============================== Shell ============================== */
.app{ display:flex; height:100vh; width:100vw; }

/* ---------- Sidebar: one clickable tab per slide ---------- */
.sidebar{
  width:var(--sidebar-w); flex:0 0 var(--sidebar-w);
  background:linear-gradient(180deg,var(--brand-deep),var(--brand-deeper));
  color:#fff; display:flex; flex-direction:column;
  border-right:1px solid rgba(255,255,255,.06);
}
.brand{ padding:22px 22px 16px; border-bottom:1px solid rgba(255,255,255,.08); }
.brand .logo{ display:block; height:34px; width:auto; }
.brand .sub{ font-size:11px; text-transform:uppercase; letter-spacing:1.6px; color:var(--muted); margin-top:10px; }

.tablist{
  flex:1 1 auto; overflow-y:auto; padding:10px 10px 18px;
  scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.25) transparent;
}
.tablist::-webkit-scrollbar{ width:8px; }
.tablist::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.18); border-radius:8px; }

.tab{
  display:flex; align-items:center; gap:12px; width:100%; text-align:left;
  background:transparent; border:0; color:#dfe5ff; padding:9px 12px;
  border-radius:10px; cursor:pointer; font:inherit; line-height:1.25;
  transition:background .15s,color .15s;
}
.tab:hover{ background:rgba(255,255,255,.07); color:#fff; }
.tab.active{ background:var(--brand); color:#fff; box-shadow:inset 0 0 0 1px rgba(255,255,255,.12); }
.tab.active .num{ background:var(--accent); color:var(--brand-deeper); }
.tab .num{
  flex:0 0 28px; height:28px; width:28px; display:grid; place-items:center;
  background:rgba(255,255,255,.12); color:#fff; border-radius:8px; font-size:13px; font-weight:700;
}
.tab .label{ flex:1 1 auto; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ---------- Main ---------- */
.main{ flex:1 1 auto; display:flex; flex-direction:column; min-width:0; }
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:12px 18px; background:#fff; border-bottom:1px solid #e3e8f7;
}
.topbar .title{ font-size:15px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.controls{ display:flex; align-items:center; gap:8px; flex:0 0 auto; }
.btn{
  appearance:none; border:1px solid #d3daf3; background:#fff; color:var(--brand-dark);
  height:36px; padding:0 14px; border-radius:9px; font:inherit; font-weight:600; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px; transition:background .15s,border-color .15s,transform .05s;
}
.btn:hover:not(:disabled){ background:var(--paper); border-color:#b9c3ef; }
.btn:active:not(:disabled){ transform:translateY(1px); }
.btn:disabled{ opacity:.45; cursor:default; }
.btn.primary{ background:var(--brand); border-color:var(--brand); color:#fff; }
.btn.primary:hover:not(:disabled){ background:var(--brand-dark); }
.counter{ font-variant-numeric:tabular-nums; font-weight:700; color:var(--brand-dark); min-width:64px; text-align:center; font-size:14px; }

.stage{
  position:relative; flex:1 1 auto; min-height:0; overflow:hidden; display:flex;
  padding:22px;
  background:radial-gradient(1200px 600px at 50% -10%, #fff 0%, var(--paper) 60%);
}
.slideframe{
  flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center;
}
.slideframe img{
  display:block; max-width:100%; max-height:100%; width:auto; height:auto;
  border-radius:var(--radius); box-shadow:var(--shadow); background:#fff;
}

/* Links bar (slides that contain hyperlinks, e.g. 21 & 22) */
.linkbar{
  flex:0 0 auto; display:flex; flex-wrap:wrap; align-items:center; gap:8px;
  padding:10px 18px; background:#fff; border-top:1px solid #e3e8f7;
}
.linkbar[hidden]{ display:none; }
.linkbar .lbl{
  font-size:11.5px; font-weight:800; letter-spacing:.6px; text-transform:uppercase;
  color:var(--brand-dark); margin-right:2px;
}
.linkbar a{
  font-size:13px; color:var(--brand-dark); text-decoration:none;
  border:1px solid #d3daf3; border-radius:999px; padding:5px 12px; background:var(--paper);
  transition:background .15s, border-color .15s, color .15s;
}
.linkbar a:hover{ background:#fff; border-color:var(--brand); color:var(--brand); }

/* error */
.overlay{
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; text-align:center; padding:32px; background:var(--paper);
}
.overlay.hidden{ display:none; }
.overlay .head{ font-size:18px; font-weight:800; }
.overlay code{ background:#fff; border:1px solid #dbe1f4; padding:2px 8px; border-radius:6px; font-size:13px; color:var(--brand-dark); }

/* mobile */
.menu-toggle{ display:none; }
@media (max-width:880px){
  .menu-toggle{ display:inline-flex; align-items:center; justify-content:center; height:36px; width:40px;
    border-radius:9px; border:1px solid #d3daf3; background:#fff; cursor:pointer; color:var(--brand-dark); font-size:18px; }
  .sidebar{ position:fixed; z-index:30; top:0; bottom:0; left:0; transform:translateX(-100%);
    transition:transform .22s ease; box-shadow:0 0 40px rgba(0,0,0,.35); }
  .sidebar.open{ transform:translateX(0); }
  .scrim{ position:fixed; inset:0; background:rgba(7,19,78,.45); z-index:20; opacity:0; pointer-events:none; transition:opacity .2s; }
  .scrim.show{ opacity:1; pointer-events:auto; }
}
</style>
</head>
<body>
<div class="app">

  <!-- ===================== Sidebar: slide tabs ===================== -->
  <aside class="sidebar" id="sidebar" aria-label="Slide navigation">
    <div class="brand">
      <img class="logo" src="assets/inbet-logo.png" alt="Inbet">
      <div class="sub">Welcome Presentation</div>
    </div>
    <nav class="tablist" id="tablist" role="tablist" aria-orientation="vertical"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- ===================== Main stage ===================== -->
  <main class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;min-width:0;">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle slide list">☰</button>
        <div class="title" id="slideTitle">Welcome to Inbet</div>
      </div>
      <div class="controls">
        <button class="btn" id="prevBtn">‹ Prev</button>
        <span class="counter" id="counter">– / –</span>
        <button class="btn primary" id="nextBtn">Next ›</button>
        <button class="btn" id="fsBtn" title="Fullscreen">⤢</button>
      </div>
    </header>

    <section class="stage" id="stage">
      <div class="slideframe" id="frame"><img id="slideImg" alt="Slide"></div>
      <div class="overlay hidden" id="error">
        <p class="head">No slides found</p>
        <p>Couldn’t read <code>manifest.js</code>. Make sure it sits next to <code>index.html</code>,
           then re-run <code>python build.py</code>.</p>
      </div>
    </section>
    <div class="linkbar" id="linkbar" hidden></div>
  </main>
</div>

<!-- Slide list (generated by build.py; loaded as a script so this works even via file://) -->
<script src="manifest.js"></script>
<script>
(function(){
  "use strict";
  var slides = (window.INBET_SLIDES || []);
  var $tablist=document.getElementById("tablist"),
      $img=document.getElementById("slideImg"),
      $title=document.getElementById("slideTitle"),
      $counter=document.getElementById("counter"),
      $prev=document.getElementById("prevBtn"),
      $next=document.getElementById("nextBtn"),
      $stage=document.getElementById("stage"),
      $linkbar=document.getElementById("linkbar"),
      $err=document.getElementById("error"),
      $fs=document.getElementById("fsBtn"),
      $menu=document.getElementById("menuToggle"),
      $sidebar=document.getElementById("sidebar"),
      $scrim=document.getElementById("scrim");
  var current=-1;

  if(!slides.length){ $err.classList.remove("hidden"); $prev.disabled=$next.disabled=true; return; }

  // Build one tab per slide
  slides.forEach(function(s,i){
    var b=document.createElement("button");
    b.className="tab"; b.setAttribute("role","tab");
    b.innerHTML='<span class="num">'+(i+1)+'</span><span class="label">'+esc(s.title||("Slide "+(i+1)))+'</span>';
    b.addEventListener("click",function(){ go(i); closeMobile(); });
    $tablist.appendChild(b);
  });

  function go(i){
    if(i<0||i>=slides.length||i===current) return;
    current=i;
    var s=slides[i];
    $img.src=s.file; $img.alt=s.title||("Slide "+(i+1));
    $title.textContent=s.title||("Slide "+(i+1));
    $counter.textContent=(i+1)+" / "+slides.length;
    $prev.disabled=(i<=0); $next.disabled=(i>=slides.length-1);
    var tabs=$tablist.children;
    for(var t=0;t<tabs.length;t++) tabs[t].classList.toggle("active",t===i);
    if(tabs[i]) tabs[i].scrollIntoView({block:"nearest"});
    renderLinks(s.links);
    $stage.scrollTop=0;
  }

  function renderLinks(links){
    if(!links || !links.length){ $linkbar.hidden=true; $linkbar.innerHTML=""; return; }
    var html='<span class="lbl">Links on this slide:</span>';
    links.forEach(function(l){
      html+='<a href="'+esc(l.url)+'" target="_blank" rel="noopener noreferrer">'+esc(l.label)+'</a>';
    });
    $linkbar.innerHTML=html;
    $linkbar.hidden=false;
  }

  $prev.addEventListener("click",function(){ go(current-1); });
  $next.addEventListener("click",function(){ go(current+1); });
  document.addEventListener("keydown",function(e){
    if(e.key==="ArrowRight"||e.key==="PageDown"){ go(current+1); }
    else if(e.key==="ArrowLeft"||e.key==="PageUp"){ go(current-1); }
    else if(e.key==="Home"){ go(0); }
    else if(e.key==="End"){ go(slides.length-1); }
  });

  $fs.addEventListener("click",function(){
    var el=document.documentElement;
    if(!document.fullscreenElement)(el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);
    else (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);
  });
  $menu.addEventListener("click",function(){ $sidebar.classList.toggle("open"); $scrim.classList.toggle("show"); });
  $scrim.addEventListener("click",closeMobile);
  function closeMobile(){ $sidebar.classList.remove("open"); $scrim.classList.remove("show"); }

  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

  go(0);
})();
</script>
</body>
</html>
